[package]
name = "shmtu-p2p"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
qrcode = "0.14"
local-ip-address = "0.6"
rand = "0.8"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
thiserror = "1"
aes-gcm = "0.10"
pbkdf2 = { version = "0.12", features = ["simple"] }
hmac = "0.12"
sha2 = "0.10"
zeroize = { version = "1", features = ["derive"] }
