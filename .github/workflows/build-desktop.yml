name: Build Tauri Desktop App

# 触发条件：tag v* 推送 / 手动触发
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, lfs: true }
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: 安装 bun
        run: curl -fsSL https://bun.sh/install | bash && echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - name: 构建前端 + Tauri
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.CLOUD_GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.CLOUD_GDRIVE_CLIENT_SECRET }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.CLOUD_ONEDRIVE_CLIENT_ID }}
        run: bun install && bun run build && bun run tauri build --bundles appimage
      - uses: actions/upload-artifact@v4
        with: { name: shmtu-terminal-linux, path: "src-tauri/target/release/bundle/appimage/*.AppImage", retention-days: 30 }

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, lfs: true }
      - uses: dtolnay/rust-toolchain@stable
      - run: curl -fsSL https://bun.sh/install | bash && echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - name: 构建
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.CLOUD_GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.CLOUD_GDRIVE_CLIENT_SECRET }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.CLOUD_ONEDRIVE_CLIENT_ID }}
        run: bun install && bun run build && bun run tauri build --bundles dmg
      - uses: actions/upload-artifact@v4
        with: { name: shmtu-terminal-macos, path: "src-tauri/target/release/bundle/dmg/*.dmg", retention-days: 30 }

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, lfs: true }
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: 构建
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.CLOUD_GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.CLOUD_GDRIVE_CLIENT_SECRET }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.CLOUD_ONEDRIVE_CLIENT_ID }}
        run: bun install && bun run build && bun run tauri build --bundles msi
      - uses: actions/upload-artifact@v4
        with: { name: shmtu-terminal-windows, path: "src-tauri/target/release/bundle/msi/*.msi", retention-days: 30 }

  publish-release:
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist/ }
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
